<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/style_certifications.css">
    <script src="script.js" defer></script>
    <title>our projects</title>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header__logo">
            <img src="img/main/digitalLogo.svg" alt="logo">
            <img src="img/main/logoTitle.svg" alt="logoTitle">
        </div>
        <div class="header__menu menu">
            <div class="menu__item"><a class="menu__link" href="main.html">MAIN</a></div>
            <div class="menu__item"><a class="menu__link" href="gallary.html">GALLERY</a></div>
            <div class="menu__item"><a class="menu__link" href="our_projects.html">PROJECTS</a></div>
            <div class="menu__item"><a class="menu__link" href="company_certifications.html">CERTIFICATIONS</a></div>
            <div class="menu__item"><a class="menu__link" href="contact.html">CONTACTS</a></div>
        </div>
    </div>
    <div class="certification">
        <div class="certification__title">
            <span class="certification__title-text certification__title-text--lite">Company</span>
            <span class="certification__title-text certification__title-text--dark">Certifications</span>
        </div>


    </div>

</div>
<div class="footer">
    <div class="footer__container">
        <div class="footer__logo">
            <img src="img/main/footer_logo.png" alt="logoTitle">
        </div>
        <div class="footer__information information">
            <span class="footer__title information__title">Information</span>
            <ul class="information__list">
                <li>Main</li>
                <li>Gallery</li>
                <li>Projects</li>
                <li>Certifications</li>
                <li>Contacts</li>
            </ul>
        </div>
        <div class="footer__contacts contacts">
            <span class="footer__title contacts__title">Contacts</span>
            <div class="contacts__address">
                <img src="img/main/footer__adress.png" alt="" class="contact__img">
                <span class="contact__text">1234 Sample Street
Austin Texas 78704</span>
            </div>
            <div class="contacts__phone">
                <img src="img/main/footer_phone1.svg" alt="" class="contact__img">
                <span class="contact__text">512.333.2222</span>
            </div>
            <div class="contacts__email">
                <img src="img/main/footer_email1.svg" alt="" class="contact__img">
                <span class="contact__text">sampleemail@gmail.com</span>
            </div>
        </div>
        <div class="footer__social">
            <span class="footer__title social__title">Social Media</span>
            <div class="social__icons icons">
                <img class="icons__img" src="img/main/facebook.svg" alt="">
                <img class="icons__img" src="img/main/twitter.svg" alt="">
                <img class="icons__img" src="./img/main/Linked_In.svg" alt="">
                <img class="icons__img" src="img/main/pininterest.svg" alt="">
            </div>
        </div>
    </div>
    <div class="footer__line"></div>
    <div class="footer__copyright">
        <span>© 2021 All Rights Reserved</span>
    </div>
</div>
</body>
</html>
